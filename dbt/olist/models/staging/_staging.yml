version: 2

models:
  - name: stg_orders
    description: "Staging table for Olist orders data"
    columns:
      - name: order_id
        description: "The primary key for this table"
        tests:
          - unique
          - not_null

      - name: customer_id
        description: "Identifier for the customer who placed the order"
        tests:
          - not_null

      - name: purchased_at
        description: "The timestamp when the order was purchased"
        tests:
          - not_null

      - name: order_status
        description: "The current state of the order"
        tests:
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'invoiced', 'processing', 'approved', 'unavailable', 'created']

  - name: stg_order_items
    description: "Staging table for items within an order"
    columns:
      - name: order_id
        description: "Foreign key to the orders table"
        tests:
          - not_null

      - name: order_item_id
        description: "Sequential number identifying an item within an order"
        tests:
          - not_null

      - name: product_id
        description: "Identifier for the product being sold"
        tests:
          - not_null

      - name: seller_id
        description: "Identifier for the seller"
        tests:
          - not_null

      - name: item_price
        description: "The selling price of the item"
        tests:
          - not_null

      - name: freight_value
        description: "The cost of shipping for this item"
        tests:
          - not_null

  - name: stg_order_payments
    description: "Staging table for order payment details"
    columns:
      - name: order_id
        description: "Foreign key to the orders table"
        tests:
          - not_null

      - name: payment_sequential
        description: "The sequence of payments for an order (e.g., 1, 2, 3)"
        tests:
          - not_null

      - name: payment_type
        description: "The method of payment used"
        tests:
          - not_null
          - accepted_values:
              values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']

      - name: payment_installments
        description: "Number of installments chosen by the customer"
        tests:
          - not_null

      - name: payment_value
        description: "The total amount paid in this specific transaction"
        tests:
          - not_null
  - name: stg_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: category_name
        tests:
          - not_null # Critical for grouping revenue

  - name: stg_sellers
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null
      - name: zip_code_prefix
        tests:
          - not_null
      - name: city
        tests:
          - not_null

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null # Necessary for Customer Lifetime Value (CLV)
      - name: zip_code_prefix
        tests:
          - not_null