<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Source -->
  <rect x="240" y="20" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#444441" x="340" y="37" text-anchor="middle" dominant-baseline="central">Kaggle</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="340" y="53" text-anchor="middle" dominant-baseline="central">Olist Brazilian e-commerce</text>

  <line x1="340" y1="64" x2="340" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Ingestion -->
  <rect x="200" y="104" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="340" y="124" text-anchor="middle" dominant-baseline="central">Python ingestion script</text>
  <text font-family="sans-serif" font-size="12" fill="#0F6E56" x="340" y="144" text-anchor="middle" dominant-baseline="central">Cast types, partition by month, save Parquet</text>

  <line x1="340" y1="160" x2="340" y2="196" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GCS -->
  <rect x="200" y="200" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#085041" x="340" y="220" text-anchor="middle" dominant-baseline="central">Google Cloud Storage</text>
  <text font-family="sans-serif" font-size="12" fill="#0F6E56" x="340" y="240" text-anchor="middle" dominant-baseline="central">raw/orders/, raw/static/</text>

  <line x1="340" y1="256" x2="340" y2="292" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Airflow -->
  <rect x="180" y="296" width="320" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489" x="340" y="316" text-anchor="middle" dominant-baseline="central">Apache Airflow</text>
  <text font-family="sans-serif" font-size="12" fill="#534AB7" x="340" y="336" text-anchor="middle" dominant-baseline="central">dag_load_static + dag_gcs_to_bq (monthly)</text>

  <line x1="340" y1="352" x2="340" y2="388" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- BQ Raw -->
  <rect x="40" y="392" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C" x="130" y="412" text-anchor="middle" dominant-baseline="central">olist_raw</text>
  <text font-family="sans-serif" font-size="12" fill="#185FA5" x="130" y="432" text-anchor="middle" dominant-baseline="central">9 raw tables</text>

  <!-- BQ Staging -->
  <rect x="250" y="392" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C" x="340" y="412" text-anchor="middle" dominant-baseline="central">olist_staging</text>
  <text font-family="sans-serif" font-size="12" fill="#185FA5" x="340" y="432" text-anchor="middle" dominant-baseline="central">Cleaned, typed (dbt)</text>

  <!-- BQ Marts -->
  <rect x="460" y="392" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C" x="550" y="412" text-anchor="middle" dominant-baseline="central">olist_marts</text>
  <text font-family="sans-serif" font-size="12" fill="#185FA5" x="550" y="432" text-anchor="middle" dominant-baseline="central">fct_orders, dim_customers</text>

  <!-- Arrows between BQ layers -->
  <line x1="220" y1="420" x2="248" y2="420" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="420" x2="458" y2="420" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- dbt label -->
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="340" y="472" text-anchor="middle">dbt transforms staging → intermediate → marts</text>

  <line x1="550" y1="448" x2="550" y2="504" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Looker -->
  <rect x="420" y="508" width="220" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
