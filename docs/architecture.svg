  <text font-family="sans-serif" font-size="12" fill="#993C1D" x="530" y="548" text-anchor="middle" dominant-baseline="central">Orders, delivery, revenue KPIs</text>

  <!-- Terraform -->
  <rect x="40" y="508" width="200" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#633806" x="140" y="528" text-anchor="middle" dominant-baseline="central">Terraform</text>
  <text font-family="sans-serif" font-size="12" fill="#854F0B" x="140" y="548" text-anchor="middle" dominant-baseline="central">GCS bucket + BQ datasets</text>
</svg>