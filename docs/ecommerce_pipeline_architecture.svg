<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Source -->
  <g onclick="sendPrompt('Tell me about the Olist dataset')" style="cursor:pointer">
    <rect x="240" y="20" width="200" height="44" rx="8" style="fill:rgb(68, 68, 65);stroke:rgb(180, 178, 169);stroke-width:0.5px;"/>
    <text x="340" y="37" text-anchor="middle" dominant-baseline="central" style="fill:rgb(211, 209, 199);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Kaggle</text>
    <text x="340" y="53" text-anchor="middle" dominant-baseline="central" style="fill:rgb(180, 178, 169);font-family:system-ui,sans-serif;font-size:12px;">Olist Brazilian e-commerce</text>
  </g>

  <line x1="340" y1="64" x2="340" y2="102" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>

  <!-- Ingestion -->
  <g onclick="sendPrompt('How does the ingestion script work?')" style="cursor:pointer">
    <rect x="200" y="104" width="280" height="56" rx="8" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);stroke-width:0.5px;"/>
    <text x="340" y="124" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Python Ingestion Script</text>
    <text x="340" y="144" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:system-ui,sans-serif;font-size:12px;">Cast types, partition by month, save Parquet</text>
  </g>

  <line x1="340" y1="160" x2="340" y2="198" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>

  <!-- GCS -->
  <g onclick="sendPrompt('How is data structured in GCS?')" style="cursor:pointer">
    <rect x="200" y="200" width="280" height="56" rx="8" style="fill:rgb(8, 80, 65);stroke:rgb(93, 202, 165);stroke-width:0.5px;"/>
    <text x="340" y="220" text-anchor="middle" dominant-baseline="central" style="fill:rgb(159, 225, 203);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Google Cloud Storage</text>
    <text x="340" y="240" text-anchor="middle" dominant-baseline="central" style="fill:rgb(93, 202, 165);font-family:system-ui,sans-serif;font-size:12px;">raw/orders/, raw/order_reviews/, raw/static/</text>
  </g>

  <line x1="340" y1="256" x2="340" y2="294" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>

  <!-- Airflow -->
  <g onclick="sendPrompt('How do the Airflow DAGs work?')" style="cursor:pointer">
    <rect x="180" y="296" width="320" height="56" rx="8" style="fill:rgb(60, 52, 137);stroke:rgb(175, 169, 236);stroke-width:0.5px;"/>
    <text x="340" y="316" text-anchor="middle" dominant-baseline="central" style="fill:rgb(206, 203, 246);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Apache Airflow</text>
    <text x="340" y="336" text-anchor="middle" dominant-baseline="central" style="fill:rgb(175, 169, 236);font-family:system-ui,sans-serif;font-size:12px;">dag_load_static + dag_gcs_to_bq (monthly)</text>
  </g>

  <line x1="340" y1="352" x2="340" y2="390" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>

  <!-- BQ Raw -->
  <g onclick="sendPrompt('What tables are in olist_raw?')" style="cursor:pointer">
    <rect x="30" y="392" width="160" height="56" rx="8" style="fill:rgb(12, 68, 124);stroke:rgb(133, 183, 235);stroke-width:0.5px;"/>
    <text x="110" y="412" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181, 212, 244);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">olist_raw</text>
    <text x="110" y="432" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133, 183, 235);font-family:system-ui,sans-serif;font-size:12px;">9 raw tables</text>
  </g>

  <!-- BQ Staging -->
  <g onclick="sendPrompt('What happens in olist_staging?')" style="cursor:pointer">
    <rect x="210" y="392" width="160" height="56" rx="8" style="fill:rgb(12, 68, 124);stroke:rgb(133, 183, 235);stroke-width:0.5px;"/>
    <text x="290" y="412" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181, 212, 244);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">olist_staging</text>
    <text x="290" y="432" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133, 183, 235);font-family:system-ui,sans-serif;font-size:12px;">9 models, views (dbt)</text>
  </g>

  <!-- BQ Intermediate -->
  <g onclick="sendPrompt('What does int_orders_enriched do?')" style="cursor:pointer">
    <rect x="390" y="392" width="160" height="56" rx="8" style="fill:rgb(12, 68, 124);stroke:rgb(133, 183, 235);stroke-width:0.5px;"/>
    <text x="470" y="412" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181, 212, 244);font-family:system-ui,sans-serif;font-size:13px;font-weight:500;">olist_intermediate</text>
    <text x="470" y="432" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133, 183, 235);font-family:system-ui,sans-serif;font-size:12px;">int_orders_enriched</text>
  </g>

  <!-- Arrows: raw → staging → intermediate -->
  <line x1="190" y1="420" x2="208" y2="420" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>
  <line x1="370" y1="420" x2="388" y2="420" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>

  <!-- Converging arrows to marts -->
  <line x1="290" y1="448" x2="290" y2="492" style="fill:none;stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>
  <line x1="470" y1="448" x2="470" y2="492" style="fill:none;stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>
  <line x1="290" y1="492" x2="470" y2="492" style="fill:none;stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>
  <line x1="380" y1="492" x2="380" y2="516" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>

  <!-- dbt label -->
  <text x="380" y="508" text-anchor="middle" dominant-baseline="central" style="fill:rgb(194, 192, 182);font-family:system-ui,sans-serif;font-size:11px;">dbt build: staging → intermediate → marts</text>

  <!-- BQ Marts -->
  <g onclick="sendPrompt('What mart models are in olist_marts?')" style="cursor:pointer">
    <rect x="160" y="518" width="440" height="56" rx="8" style="fill:rgb(12, 68, 124);stroke:rgb(133, 183, 235);stroke-width:0.5px;"/>
    <text x="380" y="538" text-anchor="middle" dominant-baseline="central" style="fill:rgb(181, 212, 244);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">olist_marts</text>
    <text x="380" y="558" text-anchor="middle" dominant-baseline="central" style="fill:rgb(133, 183, 235);font-family:system-ui,sans-serif;font-size:12px;">fct_orders · fct_seller_revenue · fct_delivery_by_state</text>
  </g>

  <!-- Marts → Streamlit -->
  <line x1="380" y1="574" x2="380" y2="612" marker-end="url(#arrow)" style="fill:none;stroke:rgb(156, 154, 146);stroke-width:1.5px;"/>

  <!-- Streamlit -->
  <g onclick="sendPrompt('What does the Streamlit dashboard show?')" style="cursor:pointer">
    <rect x="240" y="614" width="280" height="56" rx="8" style="fill:rgb(113, 43, 19);stroke:rgb(240, 153, 123);stroke-width:0.5px;"/>
    <text x="380" y="634" text-anchor="middle" dominant-baseline="central" style="fill:rgb(245, 196, 179);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Streamlit Dashboard</text>
    <text x="380" y="654" text-anchor="middle" dominant-baseline="central" style="fill:rgb(240, 153, 123);font-family:system-ui,sans-serif;font-size:12px;">Orders, delivery, revenue KPIs</text>
  </g>

  <!-- Terraform -->
  <g onclick="sendPrompt('What does Terraform provision?')" style="cursor:pointer">
    <rect x="30" y="614" width="180" height="56" rx="8" style="fill:rgb(99, 56, 6);stroke:rgb(239, 159, 39);stroke-width:0.5px;"/>
    <text x="120" y="634" text-anchor="middle" dominant-baseline="central" style="fill:rgb(250, 199, 117);font-family:system-ui,sans-serif;font-size:14px;font-weight:500;">Terraform</text>
    <text x="120" y="654" text-anchor="middle" dominant-baseline="central" style="fill:rgb(239, 159, 39);font-family:system-ui,sans-serif;font-size:12px;">GCS bucket + BQ datasets</text>
  </g>

</svg>
